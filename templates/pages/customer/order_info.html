{% extends 'layout.html' %}
<!--  -->
{% block content %}
<section>
  <div class="flex w-full p-2">
    <div class="flex h-full w-1/2 flex-col lg:w-1/3">
      <h4 class="mt-5 text-center font-bold">Navigation</h4>
      <nav>
        <ul>
          <li><a href="#">Update Details</a></li>
          <li><a href="#">Your Orders</a></li>
          <li><a href=" {{url_for('logout')}} ">Logout</a></li>
        </ul>
      </nav>
    </div>
    <div class="h-full w-full border-l border-red-900 p-1">
      <h3 class="text-center">
        Welcome {{user['firstname']}} {{user['surname']}}
      </h3>
      <p class="font-bold">Order details:</p>
      {% for item in order %} 
      <p></p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}

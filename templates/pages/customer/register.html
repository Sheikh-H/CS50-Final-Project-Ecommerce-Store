{% extends 'layout.html' %} {% block content %}
<!-- REGISTER -->
<div class="flex h-screen w-screen items-center justify-center text-center">
  <div
    class="flex w-9/10 flex-col items-center rounded-2xl p-5 shadow-2xl shadow-gray-500 lg:w-1/2"
  >
    <h3>Register An Account</h3>
    <p>
      Register a new account or
      <a href="{{ url_for('login') }}">login here</a>:
    </p>
    <form action="/register" method="post" class="text-left">
      <div class="mb-1 flex flex-col">
        <label class="font-bold">First Name:</label>
        <input
          type="text"
          placeholder="John"
          name="fname"
          id="fname"
          required
        />
      </div>
      <div class="mb-1 flex flex-col">
        <label class="font-bold">Last Name:</label>
        <input type="text" placeholder="Doe" name="sname" id="sname" required />
      </div>
      <div class="mb-1 flex flex-col">
        <label class="font-bold">Email:</label>
        <input
          type="email"
          placeholder="email@email.com"
          name="email"
          required
          id="email"
        />
      </div>
      <div class="mb-1 flex flex-col">
        <label class="font-bold">Address:</label>
        <input
          type="text"
          placeholder="(Door, street, town, city, postcode)"
          name="address"
          required
          id="address"
        />
      </div>
      <div class="mb-1 flex flex-col">
        <label for="password" class="font-bold">Password:</label>
        <input type="password" name="password" required />
      </div>
      <div class="flex justify-center">
        <input type="submit" class="pbutton mt-1" value="Register" />
      </div>
    </form>
    {% if message %} {{ message }} {% endif %}
  </div>
</div>
{% endblock %}

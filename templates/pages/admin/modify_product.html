{% extends 'layout.html' %} {% block content %}
<section>

  <form
    action="{{ url_for('modify_a_product', product_id=product['product_id']) }}"
    method="post"
    enctype="multipart/form-data"
  >
    <label for="name">Product Name:</label>
    <input type="text" name="name" value="{{ product['product_name'] }}" />

    <label for="description">Description</label>
    <textarea name="description" rows="5" cols="50">{{ product['product_description'] }}</textarea>

    <label for="category">Category</label>
    <input
      type="text"
      name="category"
      value="{{ product['product_category'] }}"
    />

    <label for="gender">Gender</label>
    <select name="gender" id="gender">
      <option value="Men" {% if product['product_gender'] == "Men" %} selected {% endif %}>Men</option>
      <option value="Women" {% if product['product_gender'] == "Women" %}selected{% endif %}>Women</option>
      <option value="Children" {% if product['product_gender'] == "Children" %}selected{% endif %}>Children</option>
      <option value="Unisex" {% if product['product_gender'] == "Unisex" %}selected{% endif %}>Unisex</option>
    </select>

    <label for="price">Price</label>
    <input
      type="number"
      name="price"
      step="0.01"
      value="{{ product['product_price'] }}"
    />

    <label for="brand">Brand</label>
    <input type="text" name="brand" value="{{ product['product_brand'] }}" />

    <label for="quantity">Stock Quantity</label>
    <input
      type="number"
      name="quantity"
      step="1"
      value="{{ product['product_stock_qty'] }}"
    />

    <label for="image">Product images</label>
    <div class="flex w-full border p-1">
      {% for image in images %}
      <img
        src="{{ image['image_url'] }}"
        alt="Product Image"
        class="h-28 w-28 rounded-xl p-1"
      /><div class = "flex flex-col">
        <label>
        <input name ="is_primary" type="radio" value="{{ image['image_id'] }}" {% if image['is_primary'] == 1%}checked{% endif %} />
        Primary Image </label>
          <label>
            <button onsubmit="return confirm('Delete image?')" formaction="{{ url_for('delete_image', image_id = image['image_id'], product_id = product['product_id']) }}" formmethod="post" type="submit" name = 'delete_image' class = "sbutton" value="{{ image['image_id'] }}">Delete Image</button>
          </label>
      </div>
      {% endfor %}
    </div>
    <div>
      <label for="images">Add images:</label>
      <input type="file" multiple accept="image/*" name="images" />
    </div>
    <button class="pbutton p-1" type="submit">Update Product</button>
  </form>
</section>
{% endblock %}

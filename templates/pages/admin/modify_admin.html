{% extends 'layout.html' %} {% block content %}
<section>
  <div>
    {% if message %}
    <p>{{message}}</p>
    {% endif %}
  </div>
  <div>
    <h3>Modify Admin:</h3>
    {% for admin in admins %}

    <form action="/modify_admins" method="post">
      <label for="admin_id">Admin ID:</label>
      <select name="admin_id">
        <option value="{{ admin['admin_id'] }}">
          ID: {{ admin['admin_id'] }}
        </option>
      </select>

      <label for="name">Admin Name:</label>
      <input type="text" value="{{ admin['name'] }}" />

      <label for="role">Role:</label>
      <select name="role">
        <option value="{{ admin['role'] }}">{{ admin['role']}}</option>
      </select>

      <label for="password">Update Password:</label>
      <input name="password" type="password" />
      <button class="pbutton p-1" type="submit">Update Admin Details</button>
    </form>
    <br />
    {% endfor %}
  </div>
</section>
{% endblock %}

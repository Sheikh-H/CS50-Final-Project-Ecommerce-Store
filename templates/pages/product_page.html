{% extends 'layout.html' %} {% block content %}
<section>
  <div class="p-5">
    <form
      action="{{ url_for('add_to_cart', product_id = product['product_id'] ) }}"
      method="post"
    >
      <div class="col-auto grid grid-cols-2">
        <div class="flex h-fit w-fit flex-col gap-5">
          {% for image in images %}
          <img
            src="{{ image['image_url'] }}"
            alt="{{product['product_name']}}"
            class="rounded-4xl"
          />
          {% endfor %}
        </div>
        <div class="flex flex-col p-5">
          <div
            class="flex h-screen w-full flex-col items-center justify-center text-center"
          >
            <h1>{{product['product_name']}}</h1>
            <p>{{ product['product_description'] }}</p>
            <p class="text-4xl font-bold">
              £{{ "{:.2f}".format(product['product_price']) }}
            </p>
            <div class="flex items-center justify-center gap-5">
              <label for="quantity">Quantity:</label>
              <input
                name="quantity"
                type="number"
                min="1"
                max="10"
                value="1"
                step="1"
              />
              <button type="submit" class="pbutton">Add To Cart</button>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</section>
{% endblock %}
